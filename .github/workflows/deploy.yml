name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      # GitHub Pages serves static files only; prerendered HTML lives under dist/client
      - name: Prepare GitHub Pages artifact
        run: |
          touch dist/client/.nojekyll
          # Flat *.html routes (/tools) + folder index for /tools/ trailing-slash URLs
          for html in dist/client/*.html; do
            name="$(basename "$html" .html)"
            if [ "$name" = "index" ] || [ "$name" = "404" ]; then
              continue
            fi
            mkdir -p "dist/client/${name}"
            cp "$html" "dist/client/${name}/index.html"
          done
          cp dist/client/index.html dist/client/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4