name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      # GitHub Pages serves static files only; prerendered HTML lives under dist/client
      - name: Prepare GitHub Pages artifact
        run: |
          touch dist/client/.nojekyll

          # For every *.html, also provide a directory/index.html variant for trailing-slash URLs.
          # Never overwrite prerendered index.html files (e.g. logs/index.html, nested posts).
          find dist/client -type f -name '*.html' ! -name '404.html' | while read -r html; do
            rel="${html#dist/client/}"
            dir=$(dirname "$rel")
            base=$(basename "$rel" .html)

            if [ "$base" = "index" ]; then
              continue
            fi

            if [ "$dir" = "." ]; then
              target_dir="dist/client/${base}"
            else
              target_dir="dist/client/${dir}/${base}"
            fi

            mkdir -p "$target_dir"
            if [ ! -f "$target_dir/index.html" ]; then
              cp "$html" "$target_dir/index.html"
            fi
          done

          cp dist/client/index.html dist/client/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
